    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;

            padding: 15px;
            border-radius: 15px;

            text-align: center;

        .install-prompt.show {

            animation: slideDown 0.3s ease-out;

        @keyframes slideDown {
            from {

                transform: translateY(-20px);
            }
            to {

            }
        }

        .install-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;

        .install-btn:hover {
            background: white;
            color: #4285f4;
        }

        .close-install {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            float: left;
            margin-top: -5px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 2rem;
            font-weight: bold;
            color: #4285f4;
            margin-bottom: 10px;
        }

        .date {
            color: #666;
            font-size: 1rem;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.3);
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            border: none;
            background: transparent;
            color: #666;
        }

        .tab.active {
            background: #4285f4;
            color: white;
            box-shadow: 0 2px 10px rgba(66, 133, 244, 0.3);
        }

        .tab-content {
            display: none;
        }

            .tabs {

            .word-actions {

            .play-button, .difficult-button, .remove-button {

                height: 30px;
                font-size: 0.9rem;

</head>
<body>
    <div class="container">
        <div id="installPrompt" class="install-prompt">
            <button class="close-install" onclick="closeInstallPrompt()">×</button>
            <div>
                <strong>📱 התקן את האפליקציה!</strong><br>
                קבל גישה מהירה לאוצר המילים היומי מבלי לזכור כתובות
            </div>
            <button class="install-btn" onclick="installApp()">התקן עכשיו</button>
        </div>

        <div class="header">
            <h1 class="title">אוצר מילים יומי</h1>
            <div class="date" id="currentDate"></div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('daily')">מילים יומיות</button>
            <button class="tab" onclick="switchTab('difficult')">
                מילים קשות 
                <span class="difficult-count" id="difficultCount">0</span>
            </button>
        </div>

        <div id="dailyTab" class="tab-content active">
            <div id="dailyContent">
                <div class="loading">טוען מילים...</div>
            </div>
            <div class="button-group">
                <button class="refresh-btn" onclick="loadWords(true)">רענן מילים</button>
            </div>
        </div>

        <div id="difficultTab" class="tab-content">
            <div id="difficultContent">
                <div class="empty-state">
                    <h3>אין מילים קשות</h3>
                    <p>הוסף מילים קשות מהמילים היומיות כדי לתרגל אותן כאן</p>
                </div>
            </div>
            <div class="button-group">
                <button class="clear-btn" onclick="clearDifficultWords()">נקה מילים קשות</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1uFypL_pbx5rGrcqzT-GvqCdz6TyXxlBSR-dOtPgQoAo/export?format=csv&gid=986656386';
        const NUM_WORDS_PER_DAY = 5;
        const CACHE_KEY = 'daily_words_cache';
        const DIFFICULT_WORDS_KEY = 'difficult_words';

        let currentTab = 'daily';
        let currentWords = [];
        let difficultWords = [];

        // Set current date
        document.getElementById('currentDate').textContent = 
            `תאריך: ${new Date().toLocaleDateString('he-IL')}`;

        // Initialize
        loadDifficultWords();
        updateDifficultCount();

        // Tab switching
        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            if (tab === 'daily') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('dailyTab').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('difficultTab').classList.add('active');
                displayDifficultWords();
            }
        }

        // Text-to-speech function
        function speakWord(word) {
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                utterance.pitch = 1;
                utterance.volume = 1;
                
                speechSynthesis.speak(utterance);
            } else {
                alert('הדפדפן שלך לא תומך בהקראה');
            }
        }

        // Difficult words management
        function loadDifficultWords() {
            const saved = JSON.parse(window.localStorage?.getItem(DIFFICULT_WORDS_KEY) || '[]');
            difficultWords = saved;
        }

        function saveDifficultWords() {
            if (window.localStorage) {
                window.localStorage.setItem(DIFFICULT_WORDS_KEY, JSON.stringify(difficultWords));
            }
        }

        function addToDifficult(word) {
            const exists = difficultWords.some(w => w.English === word.English);
            if (!exists) {
                difficultWords.push({...word, addedDate: new Date().toISOString()});
                saveDifficultWords();
                updateDifficultCount();
                
                // Visual feedback
                const button = document.querySelector(`[onclick="addToDifficult('${word.English}')"]`);
                if (button) {
                    button.classList.add('saved');
                    button.innerHTML = '★';
                    button.title = 'נשמר במילים קשות';
                }
            }
        }

        function removeFromDifficult(englishWord) {
            difficultWords = difficultWords.filter(w => w.English !== englishWord);
            saveDifficultWords();
            updateDifficultCount();
            displayDifficultWords();
        }

        function clearDifficultWords() {
            if (confirm('האם אתה בטוח שברצונך למחוק את כל המילים הקשות?')) {
                difficultWords = [];
                saveDifficultWords();
                updateDifficultCount();
                displayDifficultWords();
            }
        }

        function updateDifficultCount() {
            document.getElementById('difficultCount').textContent = difficultWords.length;
        }

        function isDifficultWord(englishWord) {
            return difficultWords.some(w => w.English === englishWord);
        }

        // Display functions
        function displayDifficultWords() {
            const content = document.getElementById('difficultContent');
            
            if (difficultWords.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <h3>אין מילים קשות</h3>
                        <p>הוסף מילים קשות מהמילים היומיות כדי לתרגל אותן כאן</p>
                    </div>
                `;
                return;
            }

            let html = '';
            difficultWords.forEach((word, index) => {
                html += `
                    <div class="word-card difficult">
                        <div class="word-header">
                            <div class="word-number">${index + 1}</div>
                            <div class="english-word">${word.English}</div>
                            <div class="word-actions">
                                <button class="play-button" onclick="speakWord('${word.English}')" title="הקרא את המילה">🔊</button>
                                <button class="remove-button" onclick="removeFromDifficult('${word.English}')" title="הסר מהמילים הקשות">🗑️</button>
                            </div>
                        </div>
                        
                        <div class="field">
                            <span class="field-label">תרגום:</span>
                            <div class="field-content hebrew">${word.Hebrew}</div>
                        </div>
                        
                        <div class="field">
                            <span class="field-label">הגייה:</span>
                            <div class="field-content pronunciation">${word.Pronunciation}</div>
                        </div>
                        
                        <div class="field">
                            <span class="field-label">דוגמה:</span>
                            <div class="field-content example">${word.Example}</div>
                        </div>
                    </div>
                `;
            });

            html += `<div class="status">נמצאות ${difficultWords.length} מילים קשות</div>`;
            content.innerHTML = html;
        }

        function isValidWord(word) {
            const requiredFields = ['English', 'Hebrew', 'Pronunciation', 'Example'];
            return requiredFields.every(field => {
                const value = word[field];
                if (!value) return false;
                const valueStr = String(value).trim();
                if (valueStr === '' || valueStr.toLowerCase() === 'nan') return false;
                return true;
            });
        }

        function parseCSV(text) {
            const lines = text.split('\n');
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            const words = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const values = [];
                let current = '';
                let inQuotes = false;

                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim().replace(/"/g, ''));
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim().replace(/"/g, ''));

                const word = {};
                headers.forEach((header, index) => {
                    word[header] = values[index] || '';
                });

                if (isValidWord(word)) {
                    words.push(word);
                }
            }
            return words;
        }

        async function fetchWords() {
            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error('Failed to fetch data');
                
                const text = await response.text();
                const allWords = parseCSV(text);
                
                if (allWords.length < NUM_WORDS_PER_DAY) {
                    throw new Error(`Not enough valid words. Found ${allWords.length}, need ${NUM_WORDS_PER_DAY}`);
                }

                const selectedWords = [];
                const usedIndices = new Set();
                
                while (selectedWords.length < NUM_WORDS_PER_DAY) {
                    const randomIndex = Math.floor(Math.random() * allWords.length);
                    if (!usedIndices.has(randomIndex)) {
                        usedIndices.add(randomIndex);
                        selectedWords.push(allWords[randomIndex]);
                    }
                }

                return selectedWords;
            } catch (error) {
                throw new Error(`Error loading words: ${error.message}`);
            }
        }

        function getCachedWords() {
            if (!window.localStorage) return null;
            
            const cached = window.localStorage.getItem(CACHE_KEY);
            if (!cached) return null;

            try {
                const data = JSON.parse(cached);
                const today = new Date().toDateString();
                if (data.date === today && data.words && data.words.length > 0) {
                    return data.words;
                }
            } catch (e) {
                console.error('Error parsing cached data:', e);
            }
            return null;
        }

        function cacheWords(words) {
            if (!window.localStorage) return;
            
            const data = {
                date: new Date().toDateString(),
                words: words
            };
            window.localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        }

        function displayWords(words) {
            const content = document.getElementById('dailyContent');
            let html = '';

            currentWords = words;

            words.forEach((word, index) => {
                const isAlreadyDifficult = isDifficultWord(word.English);
                const difficultButtonClass = isAlreadyDifficult ? 'saved' : '';
                const difficultButtonIcon = isAlreadyDifficult ? '★' : '⚠️';
                const difficultButtonTitle = isAlreadyDifficult ? 'נשמר במילים קשות' : 'הוסף למילים קשות';

                html += `
                    <div class="word-card">
                        <div class="word-header">
                            <div class="word-number">${index + 1}</div>
                            <div class="english-word">${word.English}</div>
                            <div class="word-actions">
                                <button class="play-button" onclick="speakWord('${word.English}')" title="הקרא את המילה">🔊</button>
                                <button class="difficult-button ${difficultButtonClass}" onclick="addToDifficult(currentWords[${index}])" title="${difficultButtonTitle}">${difficultButtonIcon}</button>
                            </div>
                        </div>
                        
                        <div class="field">
                            <span class="field-label">תרגום:</span>
                            <div class="field-content hebrew">${word.Hebrew}</div>
                        </div>
                        
                        <div class="field">
                            <span class="field-label">הגייה:</span>
                            <div class="field-content pronunciation">${word.Pronunciation}</div>
                        </div>
                        
                        <div class="field">
                            <span class="field-label">דוגמה:</span>
                            <div class="field-content example">${word.Example}</div>
                        </div>
                    </div>
                `;
            });

            html += `<div class="status">נטענו ${words.length} מילים בהצלחה</div>`;
            content.innerHTML = html;
        }

        function displayError(message) {
            const content = document.getElementById('dailyContent');
            content.innerHTML = `<div class="error">שגיאה: ${message}</div>`;
        }

        async function loadWords(forceRefresh = false) {
            const content = document.getElementById('dailyContent');
            content.innerHTML = '<div class="loading">טוען מילים...</div>';

            try {
                let words = null;
                
                if (!forceRefresh) {
                    words = getCachedWords();
                }

                if (!words) {
                    words = await fetchWords();
                    cacheWords(words);
                }

                displayWords(words);
            } catch (error) {
                console.error('Error:', error);
                displayError(error.message);
            }
        }

        // Load words on page load
        loadWords();
